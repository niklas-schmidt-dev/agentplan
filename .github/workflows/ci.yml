name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan tracked files for secrets
        run: npm run security:secrets
      - name: Ensure no .env files are tracked
        run: |
          if git ls-files | grep -E '^\.env(\..*)?$' | grep -vE '\.example$'; then
            echo "::error::A real .env file is tracked."
            exit 1
          fi

  test:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentplan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentplan_test
      DATABASE_URL_DIRECT: postgres://postgres:postgres@localhost:5432/agentplan_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentplan_test
      STORAGE_DRIVER: fs
      STORAGE_FS_ROOT: .data/ci-storage
      BETTER_AUTH_SECRET: ci-secret-not-for-production-00000000
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Apply database migrations
        run: npm run db:migrate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build the CLI
        run: npm run build -w agentplan
      - name: Unit, security, and integration tests
        run: npm run test
      - name: Production build
        run: npm run build

  e2e:
    name: End-to-end security tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agentplan_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/agentplan_e2e
      DATABASE_URL_DIRECT: postgres://postgres:postgres@localhost:5432/agentplan_e2e
      STORAGE_DRIVER: fs
      STORAGE_FS_ROOT: .data/e2e-storage
      BETTER_AUTH_SECRET: ci-secret-not-for-production-00000000
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run e2e security suite
        run: npm run test:e2e
